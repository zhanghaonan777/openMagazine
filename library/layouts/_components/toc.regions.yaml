schema_version: 1
spread_type: toc
pages_per_instance: 2

regions:
  - id: section_label
    rect_norm: [0.05, 0.10, 0.45, 0.14]
    role: text_decorative
    component: Kicker

  - id: accent_rule_left
    rect_norm: [0.05, 0.16, 0.30, 0.165]
    role: accent
    component: AccentRule

  - id: section_title
    rect_norm: [0.05, 0.20, 0.45, 0.36]
    role: text_decorative
    component: Title

  - id: toc_list
    rect_norm: [0.55, 0.20, 0.95, 0.90]
    role: text_decorative
    component: TocList
    component_props:
      align: left

  - id: folio_left
    rect_norm: [0.05, 0.97, 0.20, 1.0]
    role: text_decorative
    component: Folio

  - id: folio_right
    rect_norm: [0.80, 0.97, 0.95, 1.0]
    role: text_decorative
    component: Folio
