schema_version: 1
name: wes-anderson
type: mood
display_name:
  en: Wes Anderson Symmetric
  zh: 韦斯·安德森对称风

trigger_keywords:
  - "wes anderson"
  - "韦斯安德森"
  - "韦斯·安德森"
